<form action="/secretaria/{{ sec_id }}/salvar-reuniao" method="POST">
    <div class="mb-3">
        <label class="form-label">Título da Reunião</label>
        <input type="text" name="titulo" class="form-control" placeholder="Ex: Alinhamento de Metas" required>
    </div>
    <div class="mb-3">
        <label class="form-label">Data</label>
        <input type="date" name="data" class="form-control" required>
    </div>
    <div class="form-footer">
        <button type="submit" class="btn btn-success">Gravar no Banco</button>
    </div>
</form>
