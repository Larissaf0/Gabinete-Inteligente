<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gabinete Inteligente</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;700;800&family=Playfair Display:wght@700&display=swap" rel="stylesheet">
    
    <!-- offline
    <link rel="stylesheet" href="{{url_for('static', path='css/tabler.min.css')}}"> --->

    <!-- online -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/core@latest/dist/css/tabler.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        .navbar-vertical {
            background-color: #0b1a30 !important;
        }
        .navbar-vertical .nav-link, .navbar-vertical .navbar-brand {
            color: #ffffff !important;
        }
        .navbar-vertical .nav-link.active {
            background-color: #008cff !important;
            color: #ffffff !important;
            border-radius: 8px;
        }
    </style>
</head>
<body>
    <div class="page">
        <aside class="navbar navbar-vertical navbar-expand-lg navbar-dark">
            <div class="container-fluid">

                <div class="px-3 py-3" style="width: 100%;">
                <h1 style="color: #ffffff;text-align: center; font-size: 1.2rem; line-height: 1.3; margin: 0;font-family: Playfair Display; letter-spacing: 0.5px;">
                    <strong>GABINETE</strong> <br>
                    <span style="color: #008cff; font-weight: 800;font-family: Playfair Display; display: block;">INTELIGENTE</span>
                </h1>
                </div>
                
                <div class="collapse navbar-collapse" id="sidebar-menu">
                    <ul class="navbar-nav pt-lg-3">
                       <!-- <li class="nav-item">-->
                            <a class="nav-link" href="/home">
                                <span class="nav-link-icon"><i class="fa-solid fa-house"></i></span>
                                <span class="nav-link-title">Início</span>
                            </a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" href="/reunioes">
                                <span class="nav-link-icon"><i class="fa-regular fa-calendar"></i></span>
                                <span class="nav-link-title">Reuniões</span>
                            </a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" href="#">
                                <span class="nav-link-icon"><i class="fa-solid fa-share-nodes"></i></span>
                                <span class="nav-link-title">Encaminhamentos</span>
                            </a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" href="#">
                                <span class="nav-link-icon"><i class="fa-solid fa-magnifying-glass"></i></span>
                                <span class="nav-link-title">Acompanhamento</span>
                            </a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" href="#">
                                <span class="nav-link-icon"><i class="fa-regular fa-file-lines"></i></span>
                                <span class="nav-link-title">Relatórios</span>
                            </a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" href="#">
                                <span class="nav-link-icon"><i class="fa-regular fa-bell"></i></span>
                                <span class="nav-link-title">Notificações</span>
                            </a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" href="#">
                                <span class="nav-link-icon"><i class="fa-solid fa-gear"></i></span>
                                <span class="nav-link-title">Configurações</span>
                            </a>
                        </li>
                    </ul>
                    
                    <div class="mt-auto mb-3 px-3">
                        <a href="/" class="nav-link text-danger">
                            <span class="nav-link-icon"><i class="fa-solid fa-door-open"></i></span>
                            <span>Sair</span>
                        </a>
                    </div>
                </div>
            </div>
        </aside>

        <div class="page-wrapper">
            <header class="navbar navbar-expand-md navbar-light d-none d-lg-flex d-print-none">
                <div class="container-xl">
                    <div class="navbar-nav ms-auto">
                        <div class="nav-item dropdown">
                            <span class="nav-link d-flex lh-1 text-reset p-0">
                                <div class="d-none d-xl-block ps-2 text-end me-2">
                                    <div class="fs-5 text-muted">Bem-vindo(a),</div>
                                    <div class="mt-1 small font-weight-bold">{{usuario.nome}}</div>
                                </div>
                                <span class="avatar avatar-sm rounded-circle"><i class="fa-regular fa-user"></i></span>
                            </span>
                        </div>
                    </div>
                </div>
            </header>

            <main class="page-body">
                <div class="container-xl">
                    {% block content %}{% endblock %}
                </div>
            </main>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@tabler/core@latest/dist/js/tabler.min.js"></script>
    <!--
    <script src="{{url_for('static', path='js/tabler.min.js')}}"></script> --->
</body>
</html>
